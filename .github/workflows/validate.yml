name: Validate Skills

on:
  push:
    paths:
      - 'skills/**/SKILL.md'
  pull_request:
    paths:
      - 'skills/**/SKILL.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all skills
        run: |
          for skill_dir in skills/*/; do
            echo "Validating $skill_dir..."
            npx skills-ref validate "$skill_dir"
          done
